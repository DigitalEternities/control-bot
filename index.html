<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>V2RayTun Controller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #0f1235 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(18, 22, 55, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px 24px 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(66, 153, 225, 0.2);
            border: 1px solid rgba(66, 153, 225, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .icon {
            font-size: 56px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 12px rgba(66, 153, 225, 0.5));
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #a0c4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: #8b93c7;
            font-size: 14px;
            margin-top: 8px;
        }

        .status-card {
            background: rgba(10, 14, 39, 0.6);
            border-radius: 24px;
            padding: 18px 20px;
            margin-bottom: 32px;
            text-align: center;
            border: 1px solid rgba(66, 153, 225, 0.2);
        }

        .status-label {
            color: #8b93c7;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .status-value {
            color: #4ade80;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 8px #4ade80;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            font-family: inherit;
        }

        .btn-on {
            background: linear-gradient(135deg, #1e6f3f, #0f4c2d);
            color: white;
            box-shadow: 0 8px 20px rgba(30, 111, 63, 0.3);
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .btn-on:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(30, 111, 63, 0.4);
            background: linear-gradient(135deg, #238a4a, #146b38);
        }

        .btn-on:active {
            transform: translateY(1px);
        }

        .btn-off {
            background: linear-gradient(135deg, #8b2c2c, #5c1a1a);
            color: white;
            box-shadow: 0 8px 20px rgba(139, 44, 44, 0.3);
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .btn-off:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(139, 44, 44, 0.4);
            background: linear-gradient(135deg, #a33535, #732222);
        }

        .btn-off:active {
            transform: translateY(1px);
        }

        .info-text {
            text-align: center;
            color: #5b6396;
            font-size: 12px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(66, 153, 225, 0.2);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
        }

        .close-btn {
            background: rgba(66, 153, 225, 0.15);
            border: 1px solid rgba(66, 153, 225, 0.3);
            padding: 10px 20px;
            border-radius: 40px;
            color: #8b93c7;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            width: auto;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .close-btn:hover {
            background: rgba(66, 153, 225, 0.25);
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2235;
            color: #a0c4ff;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 1000;
            border: 1px solid rgba(66, 153, 225, 0.5);
            animation: fadeOut 2s ease forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🚀</div>
            <h1>V2RayTun Control</h1>
            <div class="subtitle">Управление VPN соединением</div>
        </div>

        <div class="status-card">
            <div class="status-label">ТЕКУЩИЙ СТАТУС</div>
            <div class="status-value">
                <span class="dot"></span>
                <span id="statusText">Готов к подключению</span>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-on" id="btnStart">
                🔓 Включить V2RayTun
            </button>
            <button class="btn btn-off" id="btnStop">
                🔒 Выключить V2RayTun
            </button>
        </div>

        <div class="info-text">
            ⚡ При нажатии откроется приложение V2RayTun<br>
            Если ничего не происходит — установите V2RayTun
        </div>

        <div class="footer">
            <button class="close-btn" id="btnClose">
                ✖️ Закрыть
            </button>
        </div>
    </div>

    <script>
        // Функция для показа уведомления
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#3d1a1a' : '#1e2235';
            toast.style.color = isError ? '#fca5a5' : '#a0c4ff';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 2500);
        }

        // Функция открытия схемы - РАБОЧИЙ МЕТОД
        function openV2RayScheme(url, actionType) {
            // Обновляем статус
            const statusText = document.getElementById('statusText');
            
            if (actionType === 'start') {
                statusText.innerHTML = '🔄 Включение...';
                showToast('🔄 Открываю V2RayTun...');
            } else {
                statusText.innerHTML = '🔄 Выключение...';
                showToast('🔄 Отключаю V2RayTun...');
            }
            
            // МЕТОД 1: Прямой переход (работает в некоторых версиях)
            try {
                window.location.href = url;
            } catch(e) {}
            
            // МЕТОД 2: Открытие в новой вкладке (часто срабатывает)
            setTimeout(() => {
                const win = window.open(url, '_blank');
                if (!win || win.closed || typeof win.closed === 'undefined') {
                    // МЕТОД 3: Создаём невидимую ссылку и кликаем
                    const link = document.createElement('a');
                    link.href = url;
                    link.style.display = 'none';
                    link.target = '_blank';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    // МЕТОД 4: Iframe метод
                    setTimeout(() => {
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = url;
                        document.body.appendChild(iframe);
                        setTimeout(() => {
                            document.body.removeChild(iframe);
                        }, 1000);
                    }, 100);
                }
            }, 100);
            
            // Возвращаем статус
            setTimeout(() => {
                if (actionType === 'start') {
                    statusText.innerHTML = '✅ Команда отправлена';
                    showToast('✅ V2RayTun должен открыться');
                } else {
                    statusText.innerHTML = '✅ Команда отправлена';
                    showToast('✅ V2RayTun должен закрыться');
                }
                
                setTimeout(() => {
                    if (statusText.innerHTML.includes('Команда отправлена')) {
                        statusText.innerHTML = '💚 Готов к подключению';
                    }
                }, 3000);
            }, 1500);
        }

        // Кнопка включения
        document.getElementById('btnStart').addEventListener('click', function(e) {
            e.preventDefault();
            openV2RayScheme('v2raytun://control/start', 'start');
        });

        // Кнопка выключения
        document.getElementById('btnStop').addEventListener('click', function(e) {
            e.preventDefault();
            openV2RayScheme('v2raytun://control/stop', 'stop');
        });

        // Кнопка закрытия
        document.getElementById('btnClose').addEventListener('click', function() {
            try {
                Telegram.WebApp.close();
            } catch(e) {
                window.close();
            }
        });

        // Инициализация Telegram WebApp
        try {
            let tg = Telegram.WebApp;
            tg.expand();
            tg.enableClosingConfirmation();
            tg.setHeaderColor('bg_color');
            tg.setBackgroundColor('#0a0e27');
        } catch(e) {
            console.log('Не в Telegram WebApp');
        }
    </script>
</body>
</html>
