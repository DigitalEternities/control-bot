<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Остановка V2RayTun</title>
    <script>
        window.location.href = "v2raytun://control/stop";
        
        setTimeout(function() {
            let message = document.getElementById('message');
            message.innerHTML = '<p style="color:red">⚠️ Если приложение не открылось автоматически, <a href="v2raytun://control/stop">нажмите здесь</a></p>';
            message.style.display = 'block';
        }, 2000);
    </script>
</head>
<body>
    <div id="message" style="display:none"></div>
    <p>🔄 Перенаправление в V2RayTun...</p>
</body>
</html>
